<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>梦角字卡聊天</title>
<style>
/* ============ Custom Font ============ */
@font-face {
  font-family:'MengJiaoShouXie'; src:url('https://cdn.jsdelivr.net/gh/shanshuijin/hnt/MFShuTiaoShaoNian_Noncommercial-Regular.otf') format('opentype');
  font-weight:400; font-style:normal; font-display:swap;
}

/* ============ CSS Variables & Reset ============ */
:root {
  /* 柔和白色背景体系 */
  --bg: #FFFEF1; --bg-warm: #f5f6f1; --card-bg: #ffffff;
  /* 品牌主色：橙 × 嫩绿 */
  --brand-orange: #f88f50; --brand-green: #ddd83d;
  /* 气泡：我方嫩绿磨砂、对方白色磨砂 */
  --bubble-user: rgba(218, 230, 51, 0.3); --bubble-char: rgba(255,255,255,0.72);
  --text-primary: #2f2a22; --text-secondary: #8a857a; --text-muted: #b4b0a6;
  --accent: #F8A050; --accent-hover: #ef8f38; --accent-light: #fff3e6;
  --read-color: #e8923c; --danger: #e8615b; --border: #ecebe4;
  --shadow-sm: 0 1px 3px rgba(120,110,70,0.05);
  --shadow-md: 0 4px 16px rgba(120,110,70,0.08);
  --shadow-lg: 0 -6px 30px rgba(120,110,70,0.12);
  --shadow-btn: 0 2px 8px rgba(248,160,80,0.28);
  --radius-sm: 12px; --radius: 18px; --radius-lg: 26px;
  --header-h: 64px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; font-family:var(--font); background:var(--bg); color:var(--text-primary); -webkit-tap-highlight-color:transparent; }
button { cursor:pointer; border:none; font-family:inherit; }
input, textarea, select { font-family:inherit; outline:none; }

/* ============ App Shell ============ */
#app { display:flex; height:100dvh; width:100vw; position:relative; overflow:hidden; }

/* ============ Chat View ============ */
.chat-view { flex:1; display:flex; flex-direction:column; min-width:0; background:var(--bg); position:relative; overflow:hidden; }

/* ============ 弥散光球：置于气泡之下 ============ */
.chat-view::before {
  content:''; position:absolute; top:-280px; left:50%; transform:translateX(-50%);
  width:520px; height:640px; border-radius:50%; pointer-events:none; z-index:0;
  background:radial-gradient(circle at 50% 50%,
    var(--brand-orange) 0%,
    var(--brand-orange) 18%,
    #ecc24f 38%,
    var(--brand-green) 54%,
    var(--brand-green) 64%,
    rgba(221,211,61,0) 100%);
  filter:blur(36px); opacity:0.92;
}
/* 光球向下柔化过渡（置于气泡之下） */
.chat-view::after {
  content:''; position:absolute; top:260px; left:0; right:0; height:200px; pointer-events:none; z-index:0;
  background:linear-gradient(to bottom, rgba(255,254,241,0) 0%, rgba(255,254,241,0.5) 40%, var(--bg) 85%);
}

/* ============ 标题区 ============ */
.chat-titles {
  position:absolute; top:110px; left:0; right:0; z-index:2; pointer-events:none;
  display:flex; flex-direction:column; align-items:center; gap:6px;
}
.chat-titles .ct-main {
  font-family:'MengJiaoShouXie', "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
  font-size:160px; font-weight:700; letter-spacing:0.04em;
  color:#fbfaf5; text-shadow:0 1px 12px rgba(180,160,120,0.35);
  line-height:1.1;
}
.chat-titles .ct-sub {
  font-family:'MengJiaoShouXie', "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
  font-size:40px; font-weight:700; letter-spacing:0.14em;
  color:#fbfaf5; text-shadow:0 1px 4px rgba(180,150,100,0.25);
  line-height:1.3; display:flex; align-items:center; gap:8px;
}
.chat-titles .ct-sub .ct-star { font-size:14px; opacity:0.75; }

/* Period reminder in chat titles */
.ct-period-reminder {
  font-family:'MengJiaoShouXie', var(--font);
  font-size:22px; font-weight:700; letter-spacing:0.08em;
  color:#fbfaf5; text-shadow:0 1px 3px rgba(253,191,92,0.25);
  line-height:1.4; pointer-events:none; display:none;
  animation:reminder-float 3s ease-in-out infinite;
}
@keyframes reminder-float {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-3px);}
}
.ct-period-reminder.show { display:block; }

/* ============ 头部（仅右侧按钮）============ */
.chat-header {
  position:absolute; top:0; left:0; right:0; z-index:3;
  display:flex; align-items:flex-start; justify-content:flex-end;
  padding:16px 16px 8px; background:transparent; flex-shrink:0; pointer-events:none;
}
.chat-header .header-right { pointer-events:auto; display:flex; align-items:center; gap:10px; }
.btn-menu, .btn-review, .btn-search {
  width:40px; height:40px; border-radius:50%;
  background:rgba(255,255,255,0.75); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s; box-shadow:var(--shadow-sm);
  font-size:18px; color:var(--text-primary);
}
.btn-menu:hover, .btn-review:hover, .btn-search:hover { background:#fff; transform:translateY(-1px); box-shadow:var(--shadow-md); }
@keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
@keyframes blink-text { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

/* ---- Messages：滚动靠近顶部时淡出（60px过渡带） ---- */
.messages-area {
  flex:1; overflow-y:auto; padding:130px 16px 18px;
  display:flex; flex-direction:column; gap:12px; scroll-behavior:smooth;
  background:transparent; position:relative; z-index:1;
  -webkit-mask-image:linear-gradient(to bottom, transparent 0px, transparent 50px, rgba(0,0,0,1) 200px, rgba(0,0,0,1) 100%);
  mask-image:linear-gradient(to bottom, transparent 0px, transparent 50px, rgba(0,0,0,1) 200px, rgba(0,0,0,1) 100%);
}
.messages-area::-webkit-scrollbar { width:4px; }
.messages-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

.msg-row { display:flex; align-items:flex-end; gap:6px; max-width:80%; animation:msg-in 0.25s ease; }
@keyframes msg-in { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
.msg-row.user { align-self:flex-end; flex-direction:row-reverse; }
.msg-row.char { align-self:flex-start; }

.msg-avatar {
  width:30px; height:30px; border-radius:50%; flex-shrink:0;
  background:var(--bg-warm); display:flex; align-items:center; justify-content:center;
  font-size:18px; overflow:hidden; align-self:flex-end;
  box-shadow:var(--shadow-sm);
}
.msg-avatar img { width:100%; height:100%; object-fit:cover; }

.msg-bubble {
  padding:11px 16px; border-radius:var(--radius-lg); font-size:14px;
  line-height:1.6; word-break:break-word; position:relative;
  backdrop-filter:blur(12px) saturate(160%); -webkit-backdrop-filter:blur(12px) saturate(160%);
}
/* 我方：嫩绿磨砂玻璃质感 */
.msg-row.user .msg-bubble {
  background:var(--bubble-user);
  border:1px solid rgba(221,211,61,0.45);
  box-shadow:0 2px 10px rgba(221,211,61,0.18);
  border-bottom-right-radius:var(--radius-sm);
}
/* 对方：白色磨砂玻璃质感 */
.msg-row.char .msg-bubble {
  background:var(--bubble-char);
  border:1px solid rgba(255,255,255,0.8);
  box-shadow:0 2px 12px rgba(120,110,70,0.08);
  border-bottom-left-radius:var(--radius-sm);
}

.msg-time { font-size:10px; color:var(--text-muted); flex-shrink:0; margin-bottom:2px; }

/* Time divider between message gaps */
.msg-time-divider {
  text-align:center; font-size:11px; color:var(--text-muted);
  padding:8px 0; opacity:0.55; user-select:none;
}
.msg-time-divider .divider-label {
  display:inline-block; padding:2px 12px;
  background:rgba(245,246,241,0.55); border-radius:10px;
  letter-spacing:0.06em;
}

.read-tag {
  font-size:10px; color:var(--read-color); display:none; font-weight:500;
  text-align:right; padding:0 8px 2px 0; margin-top:-6px;
}
.msg-empty { text-align:center; color:var(--text-muted); padding:40px 20px; font-size:13px; }

/* ---- Input (Glass + Inner Diffuse Glow) ---- */
.chat-input {
  margin:0 12px 12px;
  padding:8px 8px 8px 16px;
  background:rgba(255,254,241,0.3);
  backdrop-filter:blur(24px) saturate(160%); -webkit-backdrop-filter:blur(24px) saturate(160%);
  border:1px solid rgba(255,255,255,0.55);
  border-radius:26px;
  display:flex; gap:8px; align-items:flex-end; flex-shrink:0;
  box-shadow:
    0 2px 18px rgba(120,110,70,0.06),
    inset 0 1px 0 rgba(255,255,255,0.4);
  position:relative; overflow:hidden;
}
/* 弥散光球 — 裁入输入栏内部 */
.chat-input .glow-orb-a {
  position:absolute; top:-50%; left:10%; right:10%; height:160%;
  border-radius:50%; pointer-events:none; z-index:0;
  background:radial-gradient(ellipse at 50% 40%,
    rgba(248,143,80,0.30) 0%, rgba(248,143,80,0.12) 30%,
    rgba(221,216,61,0.10) 55%, transparent 100%);
  filter:blur(18px);
}
.chat-input .glow-orb-b {
  position:absolute; top:-20%; right:-10%; width:60%; height:140%;
  border-radius:50%; pointer-events:none; z-index:0;
  background:radial-gradient(ellipse at 60% 50%,
    rgba(221,216,61,0.18) 0%, rgba(221,216,61,0.05) 40%, transparent 100%);
  filter:blur(20px);
}
.chat-input textarea {
  flex:1; resize:none; border-radius:var(--radius-lg);
  padding:11px 16px; font-size:14px; line-height:1.4; max-height:100px;
  border:1px solid rgba(255,255,255,0.5);
  background:rgba(255,255,255,0.48);
  backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  transition:all 0.2s; position:relative; z-index:1;
  box-shadow:
    inset 0 1px 3px rgba(0,0,0,0.03),
    inset -1px -1px 3px rgba(255,255,255,0.5);
}
.chat-input textarea:focus {
  border-color:rgba(248,160,80,0.35);
  background:rgba(255,255,255,0.6);
  box-shadow:
    inset 0 1px 3px rgba(0,0,0,0.03),
    0 0 0 3px rgba(248,160,80,0.08);
  outline:none;
}
.btn-send {
  width:46px; height:46px; flex-shrink:0; border-radius:50%;
  background:rgba(255,255,255,0.35);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  color:var(--text-secondary); font-size:18px;
  display:flex; align-items:center; justify-content:center;
  border:1px solid rgba(255,255,255,0.5);
  transition:all 0.18s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 2px 8px rgba(120,110,70,0.06);
  position:relative; z-index:1;
}
.btn-send:hover {
  background:rgba(255,255,255,0.55);
  box-shadow:0 4px 14px rgba(120,110,70,0.1);
  transform:translateY(-1px);
}
.btn-send:active {
  transform:scale(0.93);
  background:rgba(255,255,255,0.45);
  box-shadow:inset 0 2px 4px rgba(0,0,0,0.04);
}
/* 发送按钮 — 暖橙强调 */
#btnSend {
  background:rgba(248,160,80,0.58); border-color:rgba(248,143,80,0.35);
  color:#fff;
  box-shadow:0 4px 16px rgba(248,160,80,0.22);
}
#btnSend::after {
  content:''; position:absolute; top:7px; left:11px;
  width:14px; height:10px; border-radius:50%;
  background:rgba(255,255,255,0.45);
  filter:blur(4px); pointer-events:none;
}
#btnSend:hover {
  background:rgba(248,160,80,0.72);
  box-shadow:0 6px 20px rgba(248,160,80,0.3);
  transform:translateY(-2px);
}
#btnSend:active {
  transform:scale(0.93);
  background:rgba(239,143,56,0.75);
  box-shadow:
    inset 3px 3px 8px rgba(120,80,30,0.18),
    inset -2px -2px 6px rgba(255,255,255,0.3),
    0 1px 0 rgba(255,255,255,0.25);
}
.btn-photo { font-size:20px; color:var(--text-secondary); }
.btn-sticker { font-size:20px; color:var(--text-secondary); }

/* ============ Sticker Panel (bottom slide-up) ============ */
.sticker-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.18); z-index:29;
  opacity:0; pointer-events:none; transition:opacity 0.22s ease;
}
.sticker-overlay.show { opacity:1; pointer-events:auto; }

.sticker-panel {
  position:fixed; bottom:0; left:0; right:0; z-index:30;
  max-height:46vh; background:rgba(255,255,255,0.78);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  box-shadow:0 -6px 30px rgba(120,110,70,0.14);
  transform:translateY(100%);
  transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
  display:flex; flex-direction:column; overflow:hidden;
}
.sticker-panel.open { transform:translateY(0); }

.sticker-panel-handle {
  display:flex; justify-content:center; padding:10px 0 6px; flex-shrink:0;
}
.sticker-panel-handle::before {
  content:''; width:36px; height:4px; border-radius:2px; background:var(--border);
}
.sticker-toolbar {
  display:flex; align-items:center; gap:10px; padding:6px 16px 10px; flex-shrink:0;
}
.btn-add-sticker {
  padding:8px 16px; font-size:13px; border-radius:20px;
  background:var(--accent); color:#fff; cursor:pointer;
  transition:all 0.15s; box-shadow:0 2px 8px rgba(248,160,80,0.25);
}
.btn-add-sticker:hover { background:var(--accent-hover); transform:translateY(-1px); }
.sticker-hint { font-size:11px; color:var(--text-muted); }

.sticker-grid-area {
  flex:1; overflow-y:auto; padding:4px 14px 16px;
}
.sticker-grid-area::-webkit-scrollbar { width:3px; }
.sticker-grid-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

.sticker-grid {
  display:grid; grid-template-columns:repeat(3, 1fr); gap:8px;
}
.sticker-item {
  aspect-ratio:1; border-radius:var(--radius-sm); overflow:hidden;
  cursor:pointer; border:1px solid var(--border);
  background:var(--bg-warm); position:relative;
  transition:transform 0.12s;
}
.sticker-item:hover { transform:scale(1.03); }
.sticker-item img {
  width:100%; height:100%; object-fit:cover; display:block;
}
.sticker-item .sticker-del {
  position:absolute; top:3px; right:3px; width:20px; height:20px;
  border-radius:50%; background:rgba(0,0,0,0.45); color:#fff;
  font-size:10px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; border:none; opacity:0; transition:opacity 0.15s;
}
.sticker-item:hover .sticker-del { opacity:1; }
.sticker-empty { text-align:center; color:var(--text-muted); padding:30px; font-size:13px; }


/* Chat message image */
.msg-photo { margin-top:6px; max-width:200px; border-radius:var(--radius-sm); overflow:hidden; }
.msg-photo img { width:100%; height:auto; display:block; }

/* ============ Red Dot Badge ============ */
.dot {
  position: absolute;
  top: -2px;
  right: -2px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 10;
}

.btn-menu-wrap { position: relative; display: inline-block; }

.dot-v1 {
  width: 9px;
  height: 9px;
  background: radial-gradient(
    circle at 35% 30%,
    rgba(255, 120, 100, 0.95),
    rgba(220, 50, 60, 0.85)
  );
  box-shadow:
    0 0 6px  rgba(255, 70, 80, 0.45),
    0 0 14px rgba(255, 60, 70, 0.20),
    0 1px 2px rgba(0, 0, 0, 0.25);
}

/* panel menu item dot anchor */
.menu-dot-anchor {
  position: relative;
  width: 28px;
  height: 24px;
  display: grid;
  place-items: center;
}
.menu-dot-anchor .dot { top: 0px; right: -2px; }

/* ============ Menu Overlay (for side panel) ============ */
.menu-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.18); z-index:9;
  opacity:0; pointer-events:none; transition:opacity 0.24s ease;
}
.menu-overlay.show { opacity:1; pointer-events:auto; }

/* ============ Side Panel (right slide-in, frosted glass) ============ */
.side-panel {
  position:fixed; top:0; right:0; width:min(280px,75vw); height:100%;
  z-index:10;
  background:rgba(255,255,255,0.62);
  backdrop-filter:blur(24px) saturate(150%);
  -webkit-backdrop-filter:blur(24px) saturate(150%);
  border-left:1px solid rgba(255,255,255,0.55);
  box-shadow:-2px 0 24px rgba(120,110,70,0.07);
  transform:translateX(100%);
  transition:transform 0.28s cubic-bezier(0.33,0,0.1,1);
  display:flex; flex-direction:column; overflow-y:auto;
}
.side-panel.open { transform:translateX(0); }
.side-panel::-webkit-scrollbar { width:3px; }
.side-panel::-webkit-scrollbar-thumb { background:rgba(180,176,166,0.3); border-radius:3px; }

/* Side panel header */
.sp-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 18px 14px; flex-shrink:0;
}
.sp-header .sp-title {
  font-family:'MengJiaoShouXie', var(--font);
  font-size:20px; color:var(--accent); letter-spacing:0.04em;
  text-shadow:0 1px 2px rgba(255,255,255,0.6);
}
.sp-header .btn-sp-close {
  width:32px; height:32px; border-radius:50%; font-size:18px;
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  color:var(--text-secondary); border:1px solid rgba(255,255,255,0.5);
  display:flex; align-items:center; justify-content:center;
  transition:all 0.15s; line-height:1;
}
.sp-header .btn-sp-close:hover { background:rgba(255,255,255,0.78); color:var(--accent); }

/* Side panel separator under header */
.sp-divider {
  height:1px; margin:0 18px;
  background:linear-gradient(to right, rgba(248,143,80,0.4), rgba(221,216,61,0.25), transparent);
  flex-shrink:0;
}

/* Side panel menu items */
.sp-menu { padding:14px 18px 24px; display:flex; flex-direction:column; gap:6px; flex:1; }
.sp-menu .menu-btn {
  display:flex; align-items:center; gap:14px; padding:13px 16px;
  border-radius:var(--radius); background:transparent;
  font-size:15px; color:var(--text-primary); transition:all 0.18s;
  border:none; text-align:left; position:relative;
  border-left:3px solid transparent;
}
.sp-menu .menu-btn:hover {
  background:rgba(255,255,255,0.58);
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  border-left-color:var(--accent);
  box-shadow:0 2px 12px rgba(120,110,70,0.06);
}
.sp-menu .menu-btn .menu-icon {
  font-size:24px; flex-shrink:0; width:32px; text-align:center;
  filter:drop-shadow(0 1px 2px rgba(120,110,70,0.1));
}
.sp-menu .menu-btn .menu-arrow {
  margin-left:auto; color:var(--text-muted); font-size:14px;
  transition:transform 0.18s;
}
.sp-menu .menu-btn:hover .menu-arrow { transform:translateX(2px); color:var(--accent); }

/* ============ Fullscreen Management View ============ */
.fullscreen-view {
  position:fixed; inset:0; z-index:15;
  background:var(--bg);
  display:flex; flex-direction:column;
  transform:translateY(100%);
  transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
.fullscreen-view.open { transform:translateY(0); }

.fs-header {
  height:var(--header-h); display:flex; align-items:center;
  padding:0 16px; background:var(--card-bg); border-bottom:2px solid var(--border);
  flex-shrink:0; position:relative; justify-content:center;
}
.fs-header .btn-back-chat {
  font-size:15px; background:transparent; color:var(--accent);
  padding:6px 10px; border-radius:var(--radius-sm); transition:background 0.15s;
  position:absolute; left:10px;
}
.fs-header .btn-back-chat:hover { background:var(--accent-light); }
.fs-header .fs-title { font-size:21px; font-weight:700; }

.fs-body { flex:1; overflow-y:auto; display:flex; flex-direction:column; }
.fs-body::-webkit-scrollbar { width:3px; }
.fs-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* ============ Card Manager ============ */
.cards-toolbar {
  display:flex; align-items:center; flex-wrap:wrap; gap:4px;
  padding:6px 10px; border-bottom:1px solid var(--border); flex-shrink:0;
}
.cards-toolbar .tb-btn {
  padding:5px 10px; font-size:11px; border-radius:var(--radius-sm);
  background:var(--bg-warm); color:var(--text-secondary);
  border:1px solid var(--border); transition:all 0.15s; white-space:nowrap;
}
.cards-toolbar .tb-btn:hover { background:var(--accent-light); color:var(--accent); border-color:var(--accent); }
.cards-toolbar .tb-search {
  flex:1; min-width:60px; padding:5px 10px; font-size:12px;
  border:1px solid var(--border); border-radius:20px; background:var(--bg-warm);
}

.btn-new-cat {

.subcat-row {

}
.subcat-chip {

.subcat-chip .sub-act-btn {

}
.subcat-chip .sub-act-btn:hover { opacity:1; }
.btn-new-subcat {
  padding:7px 14px; font-size:13px; border-radius:20px; white-space:nowrap;

}

.card-count-info {

.card-list { flex:1; overflow-y:auto; padding:4px 0; }

.card-item {

}

.card-item .card-text { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.card-item .card-weight {

}
.card-item .weight-star { font-size:14px; }
.card-item .weight-num { font-size:11px; min-width:16px; text-align:center; }
.weight-1 { color:#b0a090; } .weight-2 { color:#f0a040; }
.weight-3 { color:#e08020; } .weight-4 { color:#e04040; }

.card-item .btn-card-act {

}
.card-item .btn-card-edit:hover { background:#fff8e1; color:#f0a040; }
.card-item .btn-card-del:hover { background:#ffebee; color:var(--danger); }
.card-empty { padding:30px; text-align:center; color:var(--text-muted); font-size:12px; }

/* ============ Settings ============ */
.settings-body { padding:12px 16px; overflow-y:auto; flex:1; }
.settings-body::-webkit-scrollbar { width:3px; }
.settings-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

.setting-group { margin-bottom:16px; }
.setting-group .sg-title {

}
.setting-row {

}
.setting-row label { font-size:12px; color:var(--text-secondary); flex-shrink:0; }
.setting-row input[type="text"],
.setting-row input[type="number"] {

}
.setting-row input:focus { border-color:var(--accent); }

.prob-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; text-align:center; }
.prob-grid .prob-label { font-size:11px; color:var(--text-muted); }
.prob-grid input {

}

.btn-danger {

}
.btn-danger:hover { background:#ffebeb; }

.avatar-preview {
  width:52px; height:52px; border-radius:50%; background:var(--accent-light);

}

.avatar-preview::after {

  background:rgba(0,0,0,0.35); color:#fff; font-size:14px;

}
.avatar-preview:hover::after { opacity:1; }
.avatar-preview img { width:100%; height:100%; object-fit:cover; }
.avatar-actions { display:flex; align-items:center; gap:6px; justify-content:center; margin-top:4px; }
.btn-avatar-del {

}
.btn-avatar-del:hover { background:#ffebee; color:var(--danger); border-color:#ffc9c9; }

/* ============ Moments (朋友圈) ============ */
.moments-page { display:flex; flex-direction:column; height:100%; }

/* Gradient header */
.moments-header {
  flex-shrink:0; padding:24px 18px 20px; position:relative; overflow:hidden;
  background:linear-gradient(120deg, #F8A050 0%, #f3b65f 45%, #DDD33D 100%);
  color:#fff; display:flex; align-items:center; justify-content:space-between;
}
.moments-header::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at 20% 120%, rgba(255,255,255,0.35), transparent 50%);
  filter:blur(10px); pointer-events:none;
}
.moments-header .mh-left { display:flex; flex-direction:column; gap:4px; position:relative; z-index:1; }
.moments-header .mh-title { font-size:19px; font-weight:700; }
.moments-header .mh-sub { font-size:11px; opacity:0.85; }
.moments-header .mh-avatar {
  width:54px; height:54px; border-radius:14px; border:2px solid rgba(255,255,255,0.6);
  background:rgba(255,255,255,0.25); display:flex; align-items:center; justify-content:center;
  font-size:30px; overflow:hidden; flex-shrink:0; position:relative; z-index:1;
}
.moments-header .mh-avatar img { width:100%; height:100%; object-fit:cover; }

/* Feed */
.moments-feed { flex:1; overflow-y:auto; background:#f5f0eb; }
.moments-feed::-webkit-scrollbar { width:3px; }
.moments-feed::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

.moment-item {

  display:flex; gap:10px;
}
.moment-item .mi-avatar {
  width:38px; height:38px; border-radius:4px; flex-shrink:0;

  font-size:20px; overflow:hidden;
}
.moment-item .mi-avatar img { width:100%; height:100%; object-fit:cover; }
.moment-item .mi-body { flex:1; min-width:0; }
.moment-item .mi-name { font-size:14px; font-weight:600; color:#576b95; margin-bottom:4px; }
.moment-item .mi-text { font-size:14px; line-height:1.5; word-break:break-word; margin-bottom:8px; white-space:pre-wrap; }
.moment-item .mi-photo { margin-bottom:8px; border-radius:var(--radius-sm); overflow:hidden; max-width:240px; }
.moment-item .mi-photo img { width:100%; height:auto; display:block; object-fit:cover; }
.moment-item .mi-time { font-size:11px; color:var(--text-muted); margin-bottom:6px; }
.moment-item .mi-actions {
  display:flex; align-items:center; gap:16px; border-top:1px solid #f0ebe3; padding-top:6px;
}
.moment-item .mi-act {
  font-size:12px; color:var(--text-secondary); cursor:pointer; background:transparent;
  display:flex; align-items:center; gap:3px; transition:color 0.15s;
}
.moment-item .mi-act:hover { color:var(--accent); }
.moment-item .mi-act.liked { color:#e04040; }
.mi-likers { font-size:11px; color:var(--text-muted); padding:2px 0 4px; }
.mc-item { font-size:12px; line-height:1.5; padding:3px 0; border-bottom:1px solid #f0ebe3; }
.mc-item:last-child { border-bottom:none; }
.mc-item b { color:#576b95; }
.moment-item .mi-del-btn {
  position:absolute; bottom:8px; right:10px; width:24px; height:24px;
  border-radius:50%; font-size:12px; background:transparent; color:var(--text-muted);
  display:flex; align-items:center; justify-content:center; transition:all 0.15s;
}
.moment-item .mi-del-btn:hover { background:#ffebee; color:var(--danger); }
.moment-item { position:relative; }

/* Comment area */
.moment-comments {
  background:#faf8f5; border-radius:var(--radius-sm); padding:6px 10px;
  margin-top:4px;
}
.moment-comments .mc-input-row {
  display:flex; gap:6px; margin-top:4px;
}
.moment-comments .mc-input-row input {
  flex:1; padding:5px 10px; font-size:12px; border:1px solid var(--border);
  border-radius:20px; background:#fff;
}
.moment-comments .mc-input-row input:focus { border-color:var(--accent); }
.moment-comments .mc-send {
  padding:5px 14px; font-size:12px; border-radius:20px;
  background:var(--accent); color:#fff; transition:background 0.15s;
}
.moment-comments .mc-send:hover { background:var(--accent-hover); }
.moment-comments .mc-empty { font-size:11px; color:var(--text-muted); text-align:center; padding:4px 0; }

/* Publish button (camera icon) */
.btn-camera {
  width:34px; height:34px; border-radius:50%; background:rgba(255,255,255,0.2);
  color:#fff; font-size:16px; display:flex; align-items:center; justify-content:center;
  transition:background 0.15s;
}
.btn-camera:hover { background:rgba(255,255,255,0.35); }

/* Publish modal */
.publish-modal .pm-textarea {
  width:100%; min-height:100px; padding:10px 14px; font-size:14px;
  border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-warm);
  resize:vertical; line-height:1.5;
}
.publish-modal .pm-textarea:focus { border-color:var(--accent); }
.publish-modal .pm-img-btn {
  display:flex; align-items:center; gap:6px; padding:8px 14px; margin-top:8px;
  border-radius:var(--radius-sm); background:#e8e0d8; color:#b0a090;
  font-size:13px; cursor:not-allowed;
}

/* publish photo row */
.pm-photo-row { display:flex; align-items:center; gap:8px; margin-top:8px; }
.pm-add-photo {
  display:flex; align-items:center; gap:6px; padding:8px 14px;
  border-radius:var(--radius-sm); background:var(--bg-warm);
  color:var(--text-secondary); font-size:13px; cursor:pointer;
  border:1px solid var(--border); transition:all 0.15s;
}
.pm-add-photo:hover { background:var(--accent-light); border-color:var(--accent); color:var(--accent); }
.pm-photo-hint { font-size:11px; color:var(--text-muted); }
.pm-preview { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
.pm-preview .pm-thumb {

}
.pm-preview .pm-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.pm-preview .pm-thumb .pm-thumb-del {
  position:absolute; top:2px; right:2px; width:18px; height:18px;
  border-radius:50%; background:rgba(0,0,0,0.5); color:#fff;
  font-size:10px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; border:none; line-height:1;
}

/* multi-photo layout in moments */
.mi-photos {
  display:flex; gap:4px; flex-wrap:wrap; margin-bottom:8px;
}
.mi-photos .mi-photo {
  width:calc(33.3% - 3px); max-width:none;
}

/* ============ Diary (日记) ============ */
.diary-page { display:flex; flex-direction:column; height:100%; }
.diary-toolbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 14px; border-bottom:1px solid var(--border); flex-shrink:0;
  background:var(--card-bg);
}
.diary-toolbar .dt-month { font-size:16px; font-weight:600; }
.diary-toolbar .dt-nav { display:flex; gap:4px; }
.diary-toolbar .dt-nav button {
  width:30px; height:30px; border-radius:50%; font-size:14px;
  background:var(--bg-warm); color:var(--text-primary); transition:background 0.15s;
}
.diary-toolbar .dt-nav button:hover { background:var(--border); }
.btn-write-diary {
  padding:6px 14px; font-size:13px; border-radius:20px;
  background:var(--accent); color:#fff; transition:background 0.15s;
}
.btn-write-diary:hover { background:var(--accent-hover); }
.btn-write-diary:disabled { background:#ccc; cursor:not-allowed; }

/* Calendar grid */
.calendar-grid {
  display:grid; grid-template-columns:repeat(7,1fr); gap:2px;
  padding:8px 10px; flex-shrink:0; background:var(--card-bg);
  border-bottom:1px solid var(--border);
}
.calendar-grid .cg-hdr {
  text-align:center; font-size:11px; color:var(--text-muted); padding:4px 0;
}
.calendar-grid .cg-day {
  aspect-ratio:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; font-size:13px; border-radius:var(--radius-sm);
  cursor:pointer; transition:background 0.1s; position:relative;
}
.calendar-grid .cg-day:hover { background:var(--bg-warm); }
.calendar-grid .cg-day.today { background:var(--accent-light); font-weight:700; color:var(--accent); }
.calendar-grid .cg-day.future { color:var(--text-muted); cursor:default; pointer-events:none; }
.calendar-grid .cg-day.outside { color:#d8d0c8; }
.cg-dots { display:flex; gap:2px; position:absolute; bottom:3px; }
.cg-dot { width:5px; height:5px; border-radius:50%; }
.cg-dot.user { background:#5b9bd5; }
.cg-dot.dream { background:#6cbf6c; }

/* Diary detail */
.diary-detail { flex:1; overflow-y:auto; padding:14px 16px; }
.diary-detail::-webkit-scrollbar { width:3px; }
.diary-detail::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.diary-date-title { font-size:17px; font-weight:700; margin-bottom:14px; text-align:center; }
.diary-entry {
  background:var(--card-bg); border-radius:var(--radius); padding:14px 16px;
  margin-bottom:12px; box-shadow:var(--shadow-sm);
}
.diary-entry .de-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.diary-entry .de-author { font-size:13px; font-weight:600; color:var(--accent); }
.diary-entry .de-title { font-size:15px; font-weight:600; margin-bottom:6px; }
.diary-entry .de-body { font-size:14px; line-height:1.7; white-space:pre-wrap; word-break:break-word; }
.diary-entry .de-time { font-size:11px; color:var(--text-muted); margin-top:8px; }
.diary-entry .de-actions { margin-top:8px; display:flex; gap:8px; }
.diary-entry .de-actions button {
  font-size:12px; padding:4px 12px; border-radius:20px;
  background:var(--bg-warm); color:var(--text-secondary); transition:all 0.15s;
}
.diary-entry .de-actions button:hover { background:var(--accent-light); color:var(--accent); }
.diary-empty { text-align:center; color:var(--text-muted); padding:30px; font-size:13px; }

/* Diary comments (批阅) */
.diary-comments { margin-top:10px; }
.diary-comments .dc-item {
  padding:6px 10px; margin-bottom:4px; border-radius:var(--radius-sm);
  background:var(--bg-warm); font-size:12px; line-height:1.5;
}
.diary-comments .dc-item .dc-author { font-weight:600; color:#576b95; }
.diary-comments .dc-input-row { display:flex; gap:6px; margin-top:6px; }
.diary-comments .dc-input-row input {
  flex:1; padding:5px 10px; font-size:12px; border:1px solid var(--border);
  border-radius:20px; background:#fff;
}
.diary-comments .dc-input-row input:focus { border-color:var(--accent); }
.diary-comments .dc-send {
  padding:5px 14px; font-size:12px; border-radius:20px;
  background:var(--accent); color:#fff;
}

/* Diary edit modal */
.diary-edit-modal textarea {
  width:100%; min-height:120px; padding:10px 14px; font-size:14px;
  border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-warm);
  resize:vertical; line-height:1.6;
}
.diary-edit-modal textarea:focus { border-color:var(--accent); }
.diary-edit-modal input[type="text"] {
  width:100%; padding:8px 12px; font-size:14px; border:1px solid var(--border);
  border-radius:var(--radius-sm); background:var(--bg-warm); margin-bottom:8px;
}

.btn-review {
  width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,#F8A050,#DDD33D);
  font-size:16px; display:flex; align-items:center; justify-content:center;
  transition:transform 0.15s,box-shadow 0.15s; color:#fff; box-shadow:0 2px 8px rgba(248,160,80,0.35);
}
.btn-review:hover { transform:scale(1.08); box-shadow:0 4px 14px rgba(248,160,80,0.5); }
.btn-review:active { transform:scale(0.94); }

/* Review modal */
.review-modal .rm-textarea {
  width:100%; min-height:80px; padding:10px 14px; font-size:14px;
  border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-warm);
  resize:vertical; line-height:1.5;
}
.review-modal .rm-textarea:focus { border-color:var(--accent); }
.review-modal .rm-hint { font-size:11px; color:var(--text-muted); margin-bottom:6px; }

/* Review message in chat */
.msg-row.char .msg-bubble.review-bubble {
  background:linear-gradient(135deg,rgba(255,243,230,0.85),rgba(248,250,225,0.85));
  border:1px solid rgba(248,160,80,0.4); border-radius:var(--radius-lg);
  border-bottom-left-radius:var(--radius-sm);
}
/* Recall bubble */
.msg-row.char .msg-bubble.recall-bubble {
  background:rgba(248,160,80,0.12);
  border:1px solid rgba(248,160,80,0.25);
  color:var(--brand-orange);
  font-size:12px; font-style:italic;
}
.review-stars { font-size:18px; letter-spacing:2px; margin:4px 0; }
.review-level { font-size:15px; font-weight:700; margin:2px 0; }
.review-quote { font-size:11px; color:var(--text-muted); margin-bottom:2px; }
.review-comment { font-size:12px; color:var(--text-secondary); font-style:italic; }
.review-actions { display:flex; gap:6px; margin-top:8px; }
.review-actions button {
  font-size:11px; padding:4px 10px; border-radius:20px;
  background:var(--bg-warm); color:var(--text-secondary); transition:all 0.15s;
}
.review-actions button:hover { background:var(--accent-light); color:var(--accent); }
.review-actions button:disabled { opacity:0.4; cursor:not-allowed; }

/* ============ AI Interpret ============ */
/* 消息操作浮层（解读/收藏）— 单击梦角消息时弹出 */
.msg-action-bar {
  position:fixed; z-index:25;
  display:flex; align-items:center; gap:2px;
  padding:5px 6px; border-radius:18px;
  background:rgba(255,255,255,0.88);
  backdrop-filter:blur(20px) saturate(1.4); -webkit-backdrop-filter:blur(20px) saturate(1.4);
  border:1px solid rgba(255,255,255,0.7);
  box-shadow:0 6px 24px rgba(120,110,70,0.22);
  opacity:0; transform:scale(0.85) translateY(4px); pointer-events:none;
  transition:opacity 0.18s ease, transform 0.18s cubic-bezier(0.22,0.9,0.25,1);
}
.msg-action-bar.show { opacity:1; transform:scale(1) translateY(0); pointer-events:auto; }
/* 小三角指向被点击的消息 */
.msg-action-bar::after {
  content:''; position:absolute; bottom:-6px; left:50%; transform:translateX(-50%) rotate(45deg);
  width:10px; height:10px; background:rgba(255,255,255,0.88);
  border-right:1px solid rgba(255,255,255,0.7); border-bottom:1px solid rgba(255,255,255,0.7);
}
.msg-action-bar.below::after { bottom:auto; top:-6px; transform:translateX(-50%) rotate(225deg); }
.mab-btn {
  padding:6px 12px; font-size:13px; border:none; background:transparent;
  color:var(--text-primary); border-radius:14px; cursor:pointer;
  transition:background 0.15s, color 0.15s; white-space:nowrap;
}
.mab-btn:hover { background:var(--accent-light); color:var(--accent); }
.mab-btn.faved { color:#f5a623; }
.mab-sep { width:1px; height:18px; background:var(--border); margin:0 2px; flex-shrink:0; }

/* 收藏夹列表 */
.fav-page { display:flex; flex-direction:column; height:100%; padding:16px; box-sizing:border-box; overflow-y:auto; }
.fav-empty { text-align:center; color:var(--text-muted); padding:80px 20px; font-size:13px; line-height:1.8; }
.fav-group { margin-bottom:18px; }
.fav-group-title {
  font-size:12px; font-weight:600; color:var(--accent);
  margin-bottom:8px; padding-bottom:4px; border-bottom:1px solid var(--border);
}
.fav-item {
  background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius);
  padding:12px 14px; margin-bottom:8px; position:relative;
  box-shadow:0 1px 3px rgba(120,110,70,0.05);
}
.fav-item-text {
  font-size:13px; color:var(--text-primary); line-height:1.6;
  padding-right:28px; word-break:break-word;
}
.fav-item-interp {
  margin-top:8px; padding:8px 10px; font-size:12.5px; line-height:1.65;
  background:linear-gradient(135deg, rgba(248,160,80,0.06), rgba(221,216,61,0.08));
  border-left:3px solid var(--accent); border-radius:var(--radius-sm);
  color:var(--text-primary);
}
.fav-item-interp-label { font-size:11px; color:var(--accent); font-weight:600; margin-bottom:3px; }
.fav-item-time { font-size:11px; color:var(--text-muted); margin-top:6px; }
.fav-del {
  position:absolute; top:8px; right:8px;
  width:24px; height:24px; border:none; border-radius:50%;
  background:transparent; color:var(--text-muted); font-size:14px; cursor:pointer;
  transition:background 0.15s, color 0.15s;
}
.fav-del:hover { background:rgba(192,32,32,0.1); color:var(--danger); }

/* 朋友圈解读按钮（复用 .mi-act 样式） */
.mi-ai-btn { color:var(--accent) !important; }

/* 日记解读按钮 */
.btn-ai-diary {
  padding:4px 10px; font-size:12px; border-radius:var(--radius-sm);
  background:var(--bg-warm); color:var(--accent); border:1px solid var(--border);
  cursor:pointer; transition:background 0.2s, color 0.2s;
}
.btn-ai-diary:hover { background:var(--accent-light); color:var(--accent); }

/* 锐评解读按钮（复用 .review-actions button 样式，无需额外定义） */

/* AI 解读结果容器（统一组件） */
.ai-box {
  display:none; margin-top:8px; padding:10px 12px;
  background:linear-gradient(135deg, rgba(248,160,80,0.06), rgba(221,216,61,0.08));
  border:1px solid rgba(248,143,80,0.18); border-radius:var(--radius);
  font-size:13px; line-height:1.65; color:var(--text-primary);
}
.ai-box.show { display:block; }

/* 加载动画：三个跳动的圆点 */
.ai-loading {
  display:flex; align-items:center; gap:6px; padding:4px 0;
}
.ai-dot {
  display:inline-block; width:6px; height:6px; border-radius:50%;
  background:var(--accent); opacity:0.4;
  animation:ai-dot-bounce 1.2s ease-in-out infinite;
}
.ai-dot:nth-child(2) { animation-delay:0.2s; }
.ai-dot:nth-child(3) { animation-delay:0.4s; }
@keyframes ai-dot-bounce {
  0%, 80%, 100% { transform:translateY(0); opacity:0.3; }
  40% { transform:translateY(-6px); opacity:1; }
}
.ai-loading-text { font-size:12px; color:var(--accent); opacity:0.7; }

/* 流式文本 + 末尾光标 */
.ai-text {
  min-height:1em; word-break:break-word; white-space:pre-wrap;
}
.ai-box.streaming .ai-text::after {
  content:'▍'; display:inline; color:var(--accent);
  animation:ai-cursor-blink 0.6s step-end infinite;
}
@keyframes ai-cursor-blink {
  0%, 100% { opacity:1; }
  50% { opacity:0; }
}

/* 错误态 */
.ai-error {
  font-size:12px; color:var(--danger); line-height:1.5;
}

/* Counter-question modal */
.cq-modal { text-align:center; }
.cq-modal .cq-emoji { font-size:48px; margin:10px 0; }
.cq-modal .cq-text { font-size:16px; margin-bottom:16px; }

/* ============ Modal ============ */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:20;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity 0.2s;
}
.modal-overlay.show { opacity:1; pointer-events:auto; }
.modal-box {
  background:var(--card-bg); border-radius:var(--radius-lg); padding:24px;
  width:90%; max-width:400px; max-height:80vh; overflow-y:auto; box-shadow:var(--shadow-lg);
}
.modal-box h3 { font-size:16px; margin-bottom:14px; }
.modal-box .form-row { margin-bottom:10px; }
.modal-box .form-row label { display:block; font-size:12px; color:var(--text-secondary); margin-bottom:3px; }
.modal-box .form-row input,
.modal-box .form-row select,
.modal-box .form-row textarea {
  width:100%; padding:8px 12px; font-size:13px; border:1px solid var(--border);
  border-radius:var(--radius-sm); background:var(--bg-warm);
}
.modal-box .form-row textarea { resize:vertical; min-height:80px; }
.modal-box .form-row input:focus,
.modal-box .form-row select:focus,
.modal-box .form-row textarea:focus { border-color:var(--accent); }
.modal-btns { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; }
.modal-btns button { padding:8px 20px; font-size:13px; border-radius:var(--radius-sm); transition:all 0.15s; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent-hover); }
.btn-cancel { background:var(--bg-warm); color:var(--text-secondary); }
.btn-cancel:hover { background:var(--border); }

/* ============ Checkin (打卡) - Dual Timeline ============ */
.checkin-page { display:flex; flex-direction:column; height:100%; }

/* Word chips area */
.checkin-words-area { padding:8px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
.checkin-words-row { display:flex; flex-wrap:wrap; gap:5px; align-items:center; margin-bottom:6px; }
.checkin-word-chip {
  display:flex; align-items:center; gap:3px; padding:4px 10px; font-size:12px;
  border-radius:16px; background:var(--accent-light); color:var(--accent);
  border:1px solid rgba(248,160,80,0.3); white-space:nowrap;
}
.checkin-word-chip .cw-del {
  cursor:pointer; font-size:14px; line-height:1; opacity:0.6; transition:opacity 0.15s;
}
.checkin-word-chip .cw-del:hover { opacity:1; }
.checkin-word-add { display:flex; gap:5px; }
.checkin-word-add input {
  width:90px; padding:4px 10px; font-size:11px; border:1px solid var(--border);
  border-radius:16px; background:var(--bg-warm);
}
.checkin-word-add input:focus { border-color:var(--accent); }
.checkin-word-add button {
  padding:4px 12px; font-size:11px; border-radius:16px;
  background:var(--accent); color:#fff; cursor:pointer; transition:background 0.15s;
}
.checkin-word-add button:hover { background:var(--accent-hover); }

/* Date nav */
.checkin-date-nav {
  display:flex; align-items:center; justify-content:center; gap:12px;
  padding:10px 12px; border-bottom:1px solid var(--border); flex-shrink:0;
}
.checkin-date-nav .cdn-btn {
  width:30px; height:30px; border-radius:50%; font-size:16px; flex-shrink:0;
  background:var(--bg-warm); color:var(--text-primary); cursor:pointer;
  transition:background 0.15s; display:flex; align-items:center; justify-content:center;
}
.checkin-date-nav .cdn-btn:hover { background:var(--border); }
.checkin-date-nav .cdn-date {
  font-size:14px; font-weight:600; min-width:160px; text-align:center; user-select:none;
}

/* Timeline container */
.checkin-timeline {
  flex:1; overflow-y:auto; padding:24px 12px 16px;
  position:relative;
}
.checkin-timeline::-webkit-scrollbar { width:3px; }
.checkin-timeline::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* Center vertical line */
.checkin-timeline::before {
  content:''; position:absolute; left:50%; top:10px; bottom:20px;
  width:2px; transform:translateX(-50%);
  background:linear-gradient(to bottom,
    transparent 0%,
    rgba(200,190,170,0.35) 8%,
    rgba(200,190,170,0.55) 50%,
    rgba(200,190,170,0.35) 92%,
    transparent 100%);
  border-radius:1px;
}

.ci-empty { text-align:center; color:var(--text-muted); padding:60px 20px; font-size:14px; position:relative; z-index:1; }

/* Entry row */
.ci-entry {
  display:flex; position:relative; align-items:flex-start;
  margin-bottom:70px; animation:ci-in 0.35s ease;
}
@keyframes ci-in { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

/* 梦角 — left side of timeline */
.ci-entry.dream {
  justify-content:flex-start; padding-right:calc(20% + 20px);
}
/* 我 — right side of timeline */
.ci-entry.user {
  justify-content:flex-end; padding-left:calc(50% + 20px);
}

/* Dot on the center line */
.ci-dot {
  position:absolute; left:50%; top:12px; transform:translate(-50%,-50%);
  width:12px; height:12px; border-radius:50%; z-index:2;
}
.ci-entry.dream .ci-dot {
  background:#FBA050;
  box-shadow:0 0 0 4px var(--bg);
}
.ci-entry.user .ci-dot {
  background:#DDD33d;
  box-shadow:0 0 0 4px var(--bg);
}

/* Connector line from dot toward text */
.ci-entry::after {
  content:''; position:absolute; top:12px; height:1px;
}
/* 梦角 on left: line from center going LEFT toward dream text */
.ci-entry.dream::after {
  left:calc(50% - 24px); width:24px;
  background:#FBA050;
}
/* 我 on right: line from center going RIGHT toward user text */
.ci-entry.user::after {
  left:50%; width:24px;
  background:#DDD33d;
}

/* Text block — no background, no border, no shadow */
.ci-block {
  display:flex; align-items:baseline; gap:8px; word-break:break-word; max-width:100%;
}

/* Content text */
.ci-content {
  font-size:20px; line-height:1.5;
}
.ci-entry.dream .ci-content { color:#FBA050; }
.ci-entry.user .ci-content { color:#DDD33d; }

/* Time label */
.ci-time-label {
  font-size:11px; color:var(--text-muted); letter-spacing:0.03em;
  font-variant-numeric:tabular-nums; flex-shrink:0;
}

/* Input bar */
.checkin-input-bar {
  padding:10px 14px; background:rgba(255,255,255,0.7);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(236,235,228,0.6); flex-shrink:0;
  display:flex; gap:8px; align-items:flex-end;
}
.checkin-input-bar textarea {
  flex:1; min-width:0; resize:none; border:1px solid var(--border); border-radius:var(--radius-lg);
  padding:10px 14px; font-size:13px; line-height:1.4; max-height:80px;
  background:var(--bg-warm); transition:all 0.2s; box-shadow:var(--shadow-sm) inset;
}
.checkin-input-bar textarea:focus { border-color:var(--accent); background:#fff; }
.btn-ci {
  padding:10px 20px; font-size:13px; border-radius:var(--radius-lg); cursor:pointer; transition:all 0.15s;
  white-space:nowrap; flex-shrink:0;
  background:var(--accent); color:#fff; box-shadow:0 2px 8px rgba(248,160,80,0.28);
}
.btn-ci:hover { background:var(--accent-hover); transform:translateY(-1px); }
.btn-ci:active { transform:scale(0.95); }

/* ============ Period Tracker ============ */
.period-page { display:flex; flex-direction:column; height:100%; }

/* Form area */
.period-form-area {
  padding:12px 16px; border-bottom:1px solid var(--border); flex-shrink:0;
  background:var(--card-bg);
}
.period-form-row {
  display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap;
}
.period-form-row label { font-size:12px; color:var(--text-secondary); flex-shrink:0; }
.period-form-row input, .period-form-row select {
  padding:6px 10px; font-size:13px; border:1px solid var(--border);
  border-radius:var(--radius-sm); background:var(--bg-warm);
}
.period-form-row input:focus, .period-form-row select:focus { border-color:var(--accent); outline:none; }
.period-form-row input[type="date"] { flex:1; min-width:0; }
.period-form-row select { width:80px; }
.btn-period-add {
  padding:8px 20px; font-size:13px; border-radius:var(--radius-lg);
  background:var(--accent); color:#fff; cursor:pointer; transition:all 0.15s;
  box-shadow:0 2px 8px rgba(248,160,80,0.25);
}
.btn-period-add:hover { background:var(--accent-hover); transform:translateY(-1px); }

/* Period calendar */
.period-calendar-area {
  padding:10px 12px; border-bottom:1px solid var(--border); flex-shrink:0;
  background:var(--card-bg);
}
.period-cal-nav {
  display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:8px;
}
.period-cal-nav button {
  width:30px; height:30px; border-radius:50%; font-size:14px;
  background:var(--bg-warm); cursor:pointer; transition:background 0.15s;
  display:flex; align-items:center; justify-content:center;
}
.period-cal-nav button:hover { background:var(--border); }
.period-cal-nav .period-cal-month { font-size:14px; font-weight:600; min-width:140px; text-align:center; }
.period-cal-legend {
  display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:6px;
}
.period-cal-legend span {
  display:flex; align-items:center; gap:4px; font-size:11px; color:var(--text-secondary);
}
.period-legend-dot {
  display:inline-block; width:10px; height:10px; border-radius:3px;
}
.period-legend-dot.pd { background:var(--brand-green); }
.period-legend-dot.ov { background:var(--brand-orange); }
.period-legend-dot.ft { background:#FDBF5C; }

/* Period history list */
.period-history-area {
  flex:1; overflow-y:auto; padding:8px 12px;
}
.period-history-area::-webkit-scrollbar { width:3px; }
.period-history-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.period-entry {
  display:flex; align-items:center; justify-content:space-between; gap:8px;
  padding:10px 12px; margin-bottom:6px; border-radius:var(--radius);
  background:var(--card-bg); box-shadow:var(--shadow-sm); font-size:13px;
}
.period-entry .pe-info { flex:1; min-width:0; }
.period-entry .pe-date { font-weight:600; margin-bottom:2px; }
.period-entry .pe-detail { font-size:11px; color:var(--text-muted); }
.period-entry .pe-actions { display:flex; gap:4px; flex-shrink:0; }
.period-entry .pe-actions button {
  width:28px; height:28px; border-radius:50%; font-size:12px;
  background:var(--bg-warm); color:var(--text-secondary);
  display:flex; align-items:center; justify-content:center;
  transition:all 0.12s; cursor:pointer;
}
.period-entry .pe-edit-btn:hover { background:#fff8e1; color:var(--brand-orange); }
.period-entry .pe-del-btn:hover { background:#ffebee; color:var(--danger); }
.period-empty { text-align:center; color:var(--text-muted); padding:30px; font-size:13px; }

/* Period dots on calendar */
.cg-dot.pd-dot { background:var(--brand-green); }

/* ============ Responsive ============ */
@media (max-width:600px) {
  .msg-row { max-width:90%; }
  .msg-bubble { font-size:13px; padding:8px 12px; }
  .chat-titles .ct-main { font-size:85px; font-weight:700; }
  .chat-titles .ct-sub { font-size:24px; font-weight:700; }
  .chat-titles { top:70px; }
  .chat-input { padding:8px 10px; gap:6px; }
  .cards-toolbar { gap:2px; padding:4px 6px; }
  .cards-toolbar .tb-btn { padding:4px 7px; font-size:10px; }
  .settings-body { padding:8px 10px; }
  .ci-content { font-size:20px; }
  .ci-time-label { font-size:12px; }
  .ci-block { gap:6px; }
  .ci-entry { margin-bottom:40px; }
  .ci-entry.dream { padding-right:calc(50% +36px ); }
  .ci-entry.user { padding-left:calc(50% +36px); }
  .ci-dot { width:10px; height:10px; }
  .ci-entry::after { width:18px; }
  .ci-entry.dream::after { left:calc(50% - 18px); }
  .checkin-input-bar { padding:8px 10px; gap:4px; }
  .btn-ci { padding:8px 16px; font-size:12px; }
  .checkin-date-nav .cdn-date { font-size:13px; min-width:140px; }
}
@keyframes pulse-text { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

/* ============ Search Modal ============ */
.search-modal {
  position:fixed; inset:0; z-index:18;
  background:rgba(0,0,0,0.25);
  opacity:0; pointer-events:none; transition:opacity 0.22s ease;
  display:flex; flex-direction:column;
}
.search-modal.show { opacity:1; pointer-events:auto; }

/* ============ Message Toast (WeChat-style dropdown banner) ============ */
.msg-toast {
  position:fixed; top:-200px; left:0; right:0; z-index:30;
  transform:none;
  width:100%;
  height:63px;
  display:flex; align-items:center;
  padding:0 14px;
  box-sizing:border-box;
  background:rgba(255,255,255,0.82);
  backdrop-filter:blur(20px) saturate(1.4); -webkit-backdrop-filter:blur(20px) saturate(1.4);
  border-bottom:1px solid rgba(120,110,70,0.10);
  box-shadow:0 6px 24px rgba(120,110,70,0.16);
  transition:top 0.36s cubic-bezier(0.22,0.9,0.25,1);
  cursor:pointer; pointer-events:auto;
}
.msg-toast.show { top:0; }
.msg-toast .toast-inner {
  display:flex; align-items:center; gap:11px;
  max-width:680px; margin:0 auto;
}
.msg-toast .toast-avatar {
  flex:0 0 auto; width:40px; height:40px; border-radius:11px;
  background:linear-gradient(135deg, var(--accent), var(--brand-orange));
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:20px; overflow:hidden;
  box-shadow:0 2px 8px rgba(248,143,80,0.28);
}
.msg-toast .toast-avatar img { width:100%; height:100%; object-fit:cover; }
.msg-toast .toast-text {
  flex:1; min-width:0;
  font-size:13.5px; color:var(--text-primary); line-height:1.5;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  overflow:hidden;
}
@media (max-width:600px) {
  .msg-toast { padding:0 12px; }
  .msg-toast .toast-avatar { width:36px; height:36px; border-radius:10px; font-size:18px; }
  .msg-toast .toast-text { font-size:13px; }
}

.search-modal .sm-panel {
  width:100%; max-width:500px; margin:0 auto;
  height:100%; height:100dvh; display:flex; flex-direction:column;
  background:rgba(255,255,255,0.72);
  backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
}

.search-bar {
  display:flex; align-items:center; gap:10px; padding:14px 16px;
  background:rgba(255,255,255,0.55); flex-shrink:0;
  border-bottom:1px solid rgba(236,235,228,0.5);
}
.search-bar input {
  flex:1; padding:9px 14px; font-size:15px; border:1px solid var(--border);
  border-radius:22px; background:var(--bg-warm);
}
.search-bar input:focus { border-color:var(--accent); outline:none; }
.search-bar .btn-search-close {
  width:36px; height:36px; border-radius:50%; font-size:16px;
  background:rgba(255,255,255,0.6); color:var(--text-secondary);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; border:none; transition:all 0.15s; flex-shrink:0;
}
.search-bar .btn-search-close:hover { background:#fff; color:var(--accent); }

.search-results {
  flex:1; overflow-y:auto; padding:12px 16px;
}
.search-results::-webkit-scrollbar { width:3px; }
.search-results::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.search-empty { text-align:center; color:var(--text-muted); padding:40px 16px; font-size:14px; }
.search-hit-count { font-size:11px; color:var(--text-muted); text-align:center; padding:8px 0 4px; }

.sr-item {
  display:flex; gap:8px; align-items:flex-start; margin-bottom:10px;
  padding:10px 12px; border-radius:var(--radius);
  background:var(--card-bg); box-shadow:var(--shadow-sm);
}
.sr-item .sr-avatar {
  width:30px; height:30px; border-radius:50%; flex-shrink:0;
  background:var(--bg-warm); display:flex; align-items:center; justify-content:center;
  font-size:16px; overflow:hidden;
}
.sr-item .sr-avatar img { width:100%; height:100%; object-fit:cover; }

// 自动清理最旧的含图片消息/动态来释放 localStorage 空间
function _freeStorageQuota() {
  try {
    var messages = JSON.parse(localStorage.getItem('mcard_messages')) || [];
    var moments = JSON.parse(localStorage.getItem('mcard_moments')) || [];
    // 收集所有含图片的条目，按时间戳排序（最旧在前）
    var items = [];
    messages.forEach(function(m, i) {
      if (m.imageData) items.push({ ts: m.timestamp || 0, key: 'mcard_messages', action: 'splice', idx: i });
    });
    moments.forEach(function(m, i) {
      if (m.imageDataList && m.imageDataList.length > 0) items.push({ ts: m.timestamp || 0, key: 'mcard_moments', action: 'splice', idx: i });
    });
    items.sort(function(a, b) { return a.ts - b.ts; });
    // 删除最旧的 3 条含图片数据
    var removed = 0;
    for (var k = 0; k < items.length && removed < 3; k++) {
      var it = items[k];
      if (it.key === 'mcard_messages' && messages[it.idx]) {
        messages[it.idx].imageData = null; delete messages[it.idx].imageData; removed++;
      } else if (it.key === 'mcard_moments' && moments[it.idx]) {
        moments[it.idx].imageDataList = []; removed++;
      }
    }
    if (removed > 0) {
      localStorage.setItem('mcard_messages', JSON.stringify(messages));
      localStorage.setItem('mcard_moments', JSON.stringify(moments));
    }
  } catch(e) { console.error('Quota cleanup failed:', e); }
}

// ============ Data Layer ============
const STORE = {

  _write(k,v) {
    try { localStorage.setItem(k,JSON.stringify(v)); }
    catch(e) {
      if (e && (e.name === 'QuotaExceededError' || e.code === 22)) {
        console.warn('localStorage quota exceeded, attempting cleanup...');
        // 尝试清理最旧的含图片数据来腾空间
        _freeStorageQuota();
        try { localStorage.setItem(k,JSON.stringify(v)); }
        catch(e2) { console.error('Storage still full after cleanup'); }
      } else { console.error('Storage write error:', e); }
    }
  },

// ============ Helpers ============
function genId() { return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }
function randomBetween(min,max) { return min+Math.random()*(max-min); }

function normalizeProbs(probs) {
  const sum=probs.reduce((a,b)=>a+b,0);
  if(sum===0) return [25,25,25,25];
  if(sum===100) return [...probs];
  const scaled=probs.map(p=>Math.round(p*100/sum));
  const diff=100-scaled.reduce((a,b)=>a+b,0);
  let maxIdx=0; for(let i=1;i<4;i++){if(scaled[i]>scaled[maxIdx])maxIdx=i;}
  scaled[maxIdx]=Math.max(0,scaled[maxIdx]+diff);
  return scaled;
}

function pickByProb(probs) {
  const sum=probs.reduce((a,b)=>a+b,0);
  if(sum<=0)return 0;
  let r=Math.random()*sum;
  for(let i=0;i<probs.length;i++){r-=probs[i];if(r<=0)return i;}
  return probs.length-1;
}

function weightedPick(items) {
  if(!items||items.length===0)return null;
  const total=items.reduce((s,it)=>s+(it.weight||1),0);
  if(total<=0)return items[0];
  let r=Math.random()*total;
  for(const it of items){r-=(it.weight||1);if(r<=0)return it;}
  return items[items.length-1];
}

function escapeHtml(str) {
  const d=document.createElement('div');d.textContent=str;return d.innerHTML;

function escapeAttr(str) {
  return escapeHtml(str).replace(/"/g, '&quot;');

// ============ Dream Behavior Engine: Seeded RNG ============
function seedRandom(seed) {
  // FNV-1a hash — a single character change flips ~half the output bits,
  // so "…_0" and "…_1" produce wildly different seeds for mulberry32.
  let h = 0x811c9dc5; // FNV offset basis
  for (let i = 0; i < seed.length; i++) {
    h ^= seed.charCodeAt(i);
    h = Math.imul(h, 0x01000193); // FNV prime (32-bit)
  }
  let state = h | 0;
  return function() {
    state |= 0;
    state = (state + 0x6D2B79F5) | 0;
    let t = Math.imul(state ^ (state >>> 15), 1 | state);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ============ Dream Behavior Engine: Global Overrides ============
let _timeOverride = null;
let _rngOverride = null;
const _origDateNow = Date.now.bind(Date);
const _origMathRandom = Math.random.bind(Math);

function setBackfillContext(timestamp, rngFn) {
  _timeOverride = timestamp;
  _rngOverride = rngFn;
  Date.now = function() { return _timeOverride; };
  Math.random = function() { return _rngOverride(); };
}

function clearBackfillContext() {
  Date.now = _origDateNow;
  Math.random = _origMathRandom;
  _timeOverride = null;
  _rngOverride = null;
}

// ============ Core: Visible cards ============
function getVisibleCards() {
  const categories=STORE.categories||[], subcategories=STORE.subcategories||[], cards=STORE.cards||[];
  const hiddenCats=new Set(categories.filter(c=>c.hidden).map(c=>c.id));
  const hiddenSubs=new Set(subcategories.filter(s=>s.hidden).map(s=>s.id));
  return cards.filter(c=>!hiddenCats.has(c.categoryId)&&!hiddenSubs.has(c.subcategoryId));
}

// ============ Core: Generate message ============
function generateMessage(opts) {
  opts = opts || {};
  // Doodle probability (configurable)
  var cfg = STORE.config || {};
  var doodleProb = (cfg.doodleProb != null ? cfg.doodleProb : 8) / 100;
  if (opts.allowDoodle && doodleProb > 0 && Math.random() < doodleProb) {
    const doodle = generateDoodle();
    if (doodle) return { doodle: doodle };
    // If mode 0 (placeholder), fall through to normal text
  }
  const visible=getVisibleCards();
  if(visible.length===0)return '【暂无可用字卡，请添加】';
  const cardProbs=cfg.cardCountProbs||[30,40,20,10];
  const count=pickByProb(cardProbs)+1;
  const picked=[];
  for(let i=0;i<count;i++){const c=weightedPick(visible);if(c)picked.push(c.text);}
  return picked.join(' ');
}

// ============ Doodle Generator ============
function generateDoodle() {
  // Mode 0: tarot placeholder — not implemented
  // Mode 1: placeholder for future doodle types
  // Mode 2: random Chinese characters (current default)
  var mode = Math.floor(Math.random() * 3);
  if (mode === 0 || mode === 1) return null; // placeholder slots
  return generateDoodleChinese();
}

var DOODLE_COLORS = ['#e04040','#F8A050','#5b9bd5','#6cbf6c','#9b59b6','#e8923c','#2f8f8f'];
var DOODLE_EMOJIS = ['❤️','✨','💕','🌟','💫','🎀','🌸','🍀','💖','☀️'];

function generateDoodleChinese() {
  // Build Chinese character pool from all visible cards
  var visible = getVisibleCards();
  var pool = [];
  visible.forEach(function(c) {
    for (var i = 0; i < c.text.length; i++) {
      var ch = c.text.charAt(i);
      if (ch >= '一' && ch <= '鿿') pool.push(ch);
    }
  });
  if (pool.length === 0) pool = ['梦','角','日','向','翔','阳','小','鱼','字','卡']; // fallback
  var len = 3 + Math.floor(Math.random() * 4); // 3–6
  var text = '';
  for (var i = 0; i < len; i++) {
    text += pool[Math.floor(Math.random() * pool.length)];
  }
  // 10% chance to add emoji
  if (Math.random() < 0.1) {
    text += DOODLE_EMOJIS[Math.floor(Math.random() * DOODLE_EMOJIS.length)];
  }
  var color = DOODLE_COLORS[Math.floor(Math.random() * DOODLE_COLORS.length)];
  return { mode: 2, text: text, color: color };
}

// ============ Core: Messages ============
function addMessage(type,text,timestamp,imageData) {
  const messages=STORE.messages||[];
  const ts = timestamp || Date.now();
  var doodleData = null;
  if (text && typeof text === 'object' && text.doodle) {
    doodleData = text.doodle;
    text = ''; // text will be replaced by canvas
  }
  const msg = {id:genId(), type, text, timestamp: ts};
  if (doodleData) msg.doodle = doodleData;
  if (imageData) msg.imageData = imageData;
  // Recall decision for dream character messages only
  if (type === 'character') {
    const engCfg = (STORE.config||{}).dreamEngine || {};
    const prob = (engCfg.prob && engCfg.prob.recallProb != null) ? engCfg.prob.recallProb : 1;
    const roll = Math.random() * 100;
    msg.recall = { prob, decided: roll < prob, time: ts + Math.floor(Math.random() * 60000), executed: false };
    // Sticker probability for dream chat messages (not for review/doodle)
    if (!imageData && !doodleData) {
      const stickerProb = (engCfg.prob && engCfg.prob.dreamChatSticker != null) ? engCfg.prob.dreamChatSticker : 0;
      if (stickerProb > 0 && Math.random() * 100 < stickerProb) {
        var stickers = STORE.stickers || [];
        if (stickers.length > 0) {
          msg.imageData = stickers[Math.floor(Math.random() * stickers.length)].dataUrl;
        }
      }
    }
    // Toast if user is not on chat screen
    if (state.fsOpen || state.panelOpen) {
      var toastText = text || '';
      if (doodleData) toastText = '[涂鸦]';
      else if (msg.imageData) toastText = '[表情包]';
      showMessageToast(toastText);
    }
  }
  messages.push(msg);
  STORE.messages=messages;
  appendMessageToDOM(msg);
}

async function sendBatch(batchCount) {
  if(state.isSending)return;
  state.isSending=true; hideIndicators();
  for(let i=0;i<batchCount;i++){
    addMessage('character',generateMessage({allowDoodle:true}));
    if(i<batchCount-1)await sleep(randomBetween(300,800));
  }
  state.isSending=false;
}

// ============ Core: Active speaking (minutes) ============
function scheduleActive() {
  clearTimeout(state.activeTimerId); state.activeTimerId=null;
  const cfg=STORE.config||{};
  const minMs=(cfg.activeMin!=null?cfg.activeMin:0.1)*60000;
  const maxMs=(cfg.activeMax!=null?cfg.activeMax:0.4)*60000;
  state.activeTimerId=setTimeout(async()=>{
    if(state.isSending){state.activeTimerId=setTimeout(()=>scheduleActive(),2000);return;}
    const probs=cfg.msgCountProbs||[30,40,20,10];
    await sendBatch(pickByProb(probs)+1);
    scheduleActive();
  },randomBetween(minMs,maxMs));
}

function stopActive() { clearTimeout(state.activeTimerId); state.activeTimerId=null; }

// ============ Core: Passive reply ============
async function triggerPassiveReply() {
  const cfg=STORE.config||{};
  const minMs=(cfg.passiveMin!=null?cfg.passiveMin:0.5)*1000;
  const maxMs=(cfg.passiveMax!=null?cfg.passiveMax:2.5)*1000;
  await sleep(randomBetween(minMs,maxMs));
  if(state.isSending)await sleep(500);
  const probs=cfg.msgCountProbs||[30,40,20,10];
  await sendBatch(pickByProb(probs)+1);
  stopActive(); scheduleActive();
}

// ============ Recall Checker ============
function checkPendingRecalls() {
  const messages = STORE.messages || [];
  let changed = false;
  const now = Date.now();
  for (const m of messages) {
    if (m.type !== 'character') continue;
    if (!m.recall || !m.recall.decided || m.recall.executed) continue;
    if (m.recall.time <= now) {
      m.recall.executed = true;
      changed = true;
    }
  }
  if (changed) {
    STORE.messages = messages;
    renderMessages();
  }
}

function renderMessages() {
  const area=document.getElementById('messagesArea');
  const messages=STORE.messages||[];
  if (messages.length===0) {
    area.innerHTML='<div class="msg-empty">开始对话吧</div>';
  } else {
    area.innerHTML = messages.map(function(m, idx) {
      const prev = idx > 0 ? messages[idx - 1] : null;
      var divider = '';
      if (prev && (m.timestamp - prev.timestamp) > 600000) {
        const t = new Date(m.timestamp).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
        divider = '<div class="msg-time-divider"><span class="divider-label">———— '+t+' ————</span></div>';
      }
      return divider + renderOneMessageHTML(m, idx);
    }).join('');
    drawAllDoodles(messages);
  }
  area.scrollTop=area.scrollHeight;
}

function getLastMessageTimestamp() {
  var msgs = STORE.messages || [];
  if (msgs.length === 0) return null;
  return msgs[msgs.length - 1].timestamp;
}

function drawAllDoodles(messages) {
  var doodles = [];
  messages.forEach((m, idx) => {
    if (m.doodle && m.type==='character') doodles.push({ id: 'doodle_cv_'+idx, doodle: m.doodle });
  });
  if (doodles.length === 0) return;
  // Ensure custom font is loaded before drawing
  if (document.fonts && document.fonts.ready) {
    document.fonts.load('1em MengJiaoShouXie').then(function() {
      doodles.forEach(function(dc) { drawDoodleCanvas(dc.id, dc.doodle); });
    });
  } else {
    // Fallback for older browsers
    setTimeout(function() {
      doodles.forEach(function(dc) { drawDoodleCanvas(dc.id, dc.doodle); });
    }, 500);
  }
}

function appendMessageToDOM(m) {
  const area=document.getElementById('messagesArea');
  const idx = (STORE.messages||[]).length - 1;
  const prevTs = getLastMessagePreceding();
  // Clear empty state if present
  if (area.querySelector('.msg-empty')) area.innerHTML = '';
  // Insert time divider if gap > 10 minutes
  if (prevTs !== null && (m.timestamp - prevTs) > 600000) {
    const t = new Date(m.timestamp).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    var divEl = document.createElement('div');
    divEl.className = 'msg-time-divider';
    divEl.innerHTML = '<span class="divider-label">———— '+t+' ————</span>';
    area.appendChild(divEl);
  }
  const html = renderOneMessageHTML(m, idx);
  var tmp = document.createElement('div');
  tmp.innerHTML = html;
  var row = tmp.firstElementChild;
  area.appendChild(row);
  // Draw doodle if needed
  if (m.doodle && m.type==='character') {
    drawDoodleCanvas('doodle_cv_'+idx, m.doodle);
  }
  area.scrollTop = area.scrollHeight;
}

// Returns the PREVIOUS message's timestamp (before the one about to be appended)
function getLastMessagePreceding() {
  var msgs = STORE.messages || [];
  if (msgs.length <= 1) return null;
  return msgs[msgs.length - 2].timestamp;
}

// ============ Doodle Canvas Drawing ============
function drawDoodleCanvas(canvasId, doodle) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;

  // Transparent background — leave blank (white-ish)
  ctx.clearRect(0, 0, W, H);

  var text = doodle.text;
  var color = doodle.color || '#e04040';
  var maxWidth = W - 20; // 10px margin each side

  var fontFamily = '"MengJiaoShouXie", "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif';

  // Find font size that fits
  var fontSize = 52;
  ctx.font = fontSize + 'px ' + fontFamily;
  while (fontSize > 24 && ctx.measureText(text).width > maxWidth) {
    fontSize--;
    ctx.font = fontSize + 'px ' + fontFamily;
  }
  // Random jitter ±4px
  fontSize += Math.floor(Math.random() * 9) - 4;
  ctx.font = fontSize + 'px ' + fontFamily;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, W / 2, H / 2);
}

// ============ Red Dot System ============
function getDotKey(viewId) {
  if (viewId === 'moments') return 'moments';
  if (viewId === 'diary') return 'diary';
  if (viewId === 'checkin') return 'checkin';
  return null;
}

function getNewestTimestamp(viewId) {
  var latest = 0;
  if (viewId === 'moments') {
    var moments = STORE.moments || [];
    moments.forEach(function(m) {
      if (m.publisher === 'dream' && m.timestamp > latest) latest = m.timestamp;
      (m.comments || []).forEach(function(c) {
        if (c.commenter === 'dream' && m.publisher !== 'dream' && c.timestamp > latest) latest = c.timestamp;
      });
    });
  } else if (viewId === 'diary') {
    var diaries = STORE.diaries || [];
    diaries.forEach(function(d) {
      if (d.author === 'dream' && d.createdAt > latest) latest = d.createdAt;
      (d.comments || []).forEach(function(c) {
        if (c.author === 'dream' && d.author !== 'dream' && c.timestamp > latest) latest = c.timestamp;
      });
    });
  } else if (viewId === 'checkin') {
    var checkins = STORE.checkins || [];
    checkins.forEach(function(c) {
      if (c.role === 'dream' && c.timestamp > latest) latest = c.timestamp;
    });
  }
  return latest;
}

function updateRedDots() {
  var lastSeen = STORE.lastSeen || {};
  var anyDot = false;
  ['moments', 'diary', 'checkin'].forEach(function(viewId) {
    var dotKey = getDotKey(viewId);
    var newest = getNewestTimestamp(viewId);
    var seen = lastSeen[dotKey] || 0;
    var show = newest > seen;
    // Panel item dot
    var panelDot = document.querySelector('[data-dot-view="' + viewId + '"]');
    if (panelDot) panelDot.style.display = show ? '' : 'none';
    if (show) anyDot = true;
  });
  // Menu button dot
  var menuDot = document.getElementById('menuBtnDot');
  if (menuDot) menuDot.style.display = anyDot ? '' : 'none';
}

function markSeen(viewId) {
  var dotKey = getDotKey(viewId);
  if (!dotKey) return;
  var lastSeen = STORE.lastSeen || {};
  lastSeen[dotKey] = Date.now();
  STORE.lastSeen = lastSeen;
  updateRedDots();
}

      <button class="sub-act-btn sub-del-btn">🗑️</button></span>`;
  }).join('')+(state.selectedCatId?'<button class="btn-new-subcat" id="btnNewSub">＋ 新建小类</button>':'<span style="font-size:11px;color:var(--text-muted);padding:4px 8px;">← 请先选择大类</span>');

function renderCardItems() {
  const list=document.getElementById('cardList'); if(!list)return;
  var allCards=STORE.cards||[];
  var catCards=allCards, subCards=allCards;
  if(state.selectedCatId)catCards=allCards.filter(c=>c.categoryId===state.selectedCatId);
  if(state.selectedSubId)subCards=catCards.filter(c=>c.subcategoryId===state.selectedSubId);
  var cards=subCards;
  const q=state.searchQuery.trim().toLowerCase();
  if(q)cards=cards.filter(c=>c.text.toLowerCase().includes(q));

  // Update count info
  var ci=document.getElementById('cardCountInfo');
  if(ci){
    var parts=[];
    if(state.selectedCatId){var cats=STORE.categories||[], catName=(cats.find(c=>c.id===state.selectedCatId)||{}).name||'?';parts.push('“'+catName+'”共 '+catCards.length+' 条');}
    if(state.selectedSubId){var subs=STORE.subcategories||[], subName=(subs.find(s=>s.id===state.selectedSubId)||{}).name||'?';parts.push('“'+subName+'”'+subCards.length+' 条');}
    ci.textContent=parts.join(' · ')||'全部字卡共 '+allCards.length+' 条';
  }

  if(cards.length===0){list.innerHTML='<div class="card-empty">暂无字卡，点击 ＋添加</div>';return;}

  list.innerHTML=cards.map(c=>{
    const w=c.weight||1;
    const wc=w>=5?'weight-5':w>=4?'weight-4':w>=3?'weight-3':w>=2?'weight-2':'weight-1';
    return `<div class="card-item" data-card-id="${c.id}">
      <span class="card-text" title="${escapeHtml(c.text)}">${escapeHtml(c.text)}</span>
      <span class="card-weight" data-card-id="${c.id}" title="点击+1权重">
        <span class="weight-star">⭐</span><span class="weight-num ${wc}">${w}</span></span>
      <button class="btn-card-act btn-card-edit" data-card-id="${c.id}" title="编辑">✏️</button>
      <button class="btn-card-act btn-card-del" data-card-id="${c.id}" title="删除">🗑️</button></div>`;
  }).join('');
}

function bindCardManagerEvents(container) {
  container.querySelector('#tbAddCard').addEventListener('click',showAddCardModal);
  container.querySelector('#tbBatch').addEventListener('click',showBatchImportModal);
  container.querySelector('#tbExport').addEventListener('click',exportData);
  container.querySelector('#tbImport').addEventListener('click',()=>document.getElementById('fileImport').click());
  container.querySelector('#tbSearch').addEventListener('input',function(){state.searchQuery=this.value;renderCardItems();});
  // Delegation: category tabs
  container.querySelector('#catTabs').addEventListener('click',e=>{
    const newCatBtn = e.target.id==='btnNewCat' ? e.target : e.target.closest('#btnNewCat');
    if(newCatBtn){
      const name=prompt('请输入大类名称：'); if(!name||!name.trim())return;
      const cats=STORE.categories||[];
      if(cats.find(c=>c.name.trim()===name.trim())){alert('该大类已存在');return;}
      cats.push({id:genId(),name:name.trim(),hidden:false});STORE.categories=cats;
      state.selectedCatId=cats[cats.length-1].id; state.selectedSubId=null;
      renderCatTabs(); renderSubchips(); renderCardItems(); return;
    }
    const tab = e.target.closest('.cat-tab'); if(!tab) return;
    const catId = tab.dataset.catId, cats=STORE.categories||[];
    const cat = cats.find(c=>c.id===catId); if(!cat) return;
    // Eye toggle
    if(e.target.closest('.cat-eye-tgl')){
      cat.hidden=!cat.hidden; STORE.categories=cats;
      renderCatTabs(); renderSubchips(); renderCardItems(); return;
    }
    // Edit button
    if(e.target.closest('.cat-edit-btn')){
      const name=prompt('修改大类名称：',cat.name);
      if(name&&name.trim()&&name.trim()!==cat.name){cat.name=name.trim();STORE.categories=cats;renderCatTabs();renderSubchips();renderCardItems();}
      return;
    }
    // Delete button
    if(e.target.closest('.cat-del-btn')){
      const sc=(STORE.subcategories||[]).filter(s=>s.categoryId===catId).length;
      const cc=(STORE.cards||[]).filter(c=>c.categoryId===catId).length;
      if(!confirm(`确定删除大类「${cat.name}」吗？\n将同时删除其下的 ${sc} 个小类和 ${cc} 条字卡。`))return;
      STORE.categories=cats.filter(c=>c.id!==catId);
      STORE.subcategories=(STORE.subcategories||[]).filter(s=>s.categoryId!==catId);
      STORE.cards=(STORE.cards||[]).filter(c=>c.categoryId!==catId);
      if(state.selectedCatId===catId){state.selectedCatId=null;state.selectedSubId=null;}
      renderCatTabs(); renderSubchips(); renderCardItems(); return;
    }
    // Select tab
    state.selectedCatId=catId; state.selectedSubId=null;
    renderCatTabs(); renderSubchips(); renderCardItems();
  });
  // Delegation: subcategory chips
  container.querySelector('#subcatRow').addEventListener('click',e=>{
    const newSubBtn = e.target.id==='btnNewSub' ? e.target : e.target.closest('#btnNewSub');
    if(newSubBtn){
      if(!state.selectedCatId){alert('请先选择一个大类');return;}
      const name=prompt('请输入小类名称：'); if(!name||!name.trim())return;
      const subs=STORE.subcategories||[];
      if(subs.find(s=>s.categoryId===state.selectedCatId&&s.name.trim()===name.trim())){alert('该小类已存在');return;}
      subs.push({id:genId(),name:name.trim(),categoryId:state.selectedCatId,hidden:false});STORE.subcategories=subs;
      renderSubchips(); return;
    }
    const chip = e.target.closest('.subcat-chip'); if(!chip) return;
    const subId = chip.dataset.subId, subs=STORE.subcategories||[];
    const sub = subs.find(s=>s.id===subId); if(!sub) return;
    // Eye toggle
    if(e.target.closest('.sub-eye-tgl')){
      sub.hidden=!sub.hidden; STORE.subcategories=subs;
      renderSubchips(); renderCardItems(); return;
    }
    // Edit button
    if(e.target.closest('.sub-edit-btn')){
      const name=prompt('修改小类名称：',sub.name);
      if(name&&name.trim()&&name.trim()!==sub.name){sub.name=name.trim();STORE.subcategories=subs;renderSubchips();renderCardItems();}
      return;
    }
    // Delete button
    if(e.target.closest('.sub-del-btn')){
      const cc=(STORE.cards||[]).filter(c=>c.subcategoryId===subId).length;
      if(!confirm(`确定删除小类「${sub.name}」吗？\n将同时删除其下的 ${cc} 条字卡。`))return;
      STORE.subcategories=subs.filter(s=>s.id!==subId);
      STORE.cards=(STORE.cards||[]).filter(c=>c.subcategoryId!==subId);
      if(state.selectedSubId===subId)state.selectedSubId=null;
      renderSubchips(); renderCardItems(); return;
    }
    // Select chip
    state.selectedSubId=subId; renderSubchips(); renderCardItems();
  });
  // Delegation: card list (weight, edit, delete)
  container.querySelector('#cardList').addEventListener('click',e=>{
    const cardItem = e.target.closest('.card-item');
    if (!cardItem) return;
    const cardId = cardItem.dataset.cardId;
    // Weight increment
    if (e.target.closest('.card-weight') && !e.target.closest('.weight-num')) {
      const cards=STORE.cards||[], card=cards.find(c=>c.id===cardId);
      if (card) { card.weight = Math.min(100, (card.weight||1)+1); STORE.cards=cards; renderCardItems(); }
      return;
    }
    // Weight number direct input
    if (e.target.closest('.weight-num')) {
      const cards=STORE.cards||[], card=cards.find(c=>c.id===cardId);
      if (!card) return;
      const v=prompt('修改权重（1~100）：',card.weight||1);
      if (v!==null) { const n=parseInt(v,10); if (!isNaN(n)&&n>=1&&n<=100) { card.weight=n; STORE.cards=cards; renderCardItems(); } else if (v.trim()!=='') { alert('请输入1~100之间的整数'); } }
      return;
    }
    // Edit button
    if (e.target.closest('.btn-card-edit')) { showEditCardModal(cardId); return; }
    // Delete button
    if (e.target.closest('.btn-card-del')) {
      if (!confirm('确定删除这条字卡吗？')) return;
      STORE.cards=(STORE.cards||[]).filter(c=>c.id!==cardId);
      renderCardItems(); return;
    }
  });
}
